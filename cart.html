<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — VillageMart</title>
<link rel="icon" href="assets/placeholder.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="nav-row">
    <a href="index.html" class="brand"><span class="leaf-dot"></span>VillageMart</a>
    <button class="hamburger" aria-label="Toggle menu">☰</button>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-badge" id="cart-count" style="display:none;">0</span></a>
      <a href="orders.html">Orders</a>
      <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
      <span id="auth-slot" style="display:flex; gap:4px; align-items:center;"></span>
    </nav>
  </div>
</header>

<div class="page-title-bar">
  <div class="container"><h1 style="font-size:1.6rem;">Your cart</h1></div>
</div>

<div class="container section">
  <div class="cart-layout">
    <div id="cart-items-wrap">
      <p class="muted">Loading cart...</p>
    </div>
    <div class="summary-box">
      <h3>Order summary</h3>
      <div class="summary-row"><span>Subtotal</span><span id="sum-subtotal">₹0</span></div>
      <div class="summary-row"><span>Delivery</span><span id="sum-delivery">₹0</span></div>
      <div class="summary-row total"><span>Total</span><span id="sum-total">₹0</span></div>
      <a href="checkout.html" class="btn btn-primary btn-block mt-16" id="checkout-btn">Proceed to checkout</a>
      <a href="products.html" class="btn btn-ghost btn-block">Continue shopping</a>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="container"><p>🌿 VillageMart — fresh groceries from your village store, delivered with care.</p></div>
</footer>

<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/sheets.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/orders.js"></script>
<script src="js/ui.js"></script>
<script>
  const DELIVERY_FEE = 20;
  let CART_PRODUCTS = [];

  document.addEventListener("DOMContentLoaded", async () => {
    UI.initHeader();
    CART_PRODUCTS = await Sheets.loadProducts();
    renderCart();

    document.getElementById("checkout-btn").addEventListener("click", (e) => {
      if (Cart.count() === 0) { e.preventDefault(); UI.toast("Your cart is empty"); return; }
      if (!Auth.isLoggedIn()) {
        e.preventDefault();
        UI.toast("Please log in to checkout");
        setTimeout(() => window.location.href = "login.html?next=checkout.html", 700);
      }
    });
  });

  function renderCart() {
    const wrap = document.getElementById("cart-items-wrap");
    const items = Cart.getLineItems(CART_PRODUCTS);

    if (!items.length) {
      wrap.innerHTML = `<div class="empty-state"><span class="emoji">🛒</span>Your cart is empty.<br><a href="products.html" class="btn btn-primary mt-16">Browse products</a></div>`;
      updateSummary(0);
      return;
    }

    wrap.innerHTML = items.map(item => `
      <div class="cart-item" data-id="${item.product.id}">
        <img src="${Sheets.resolvePhoto(item.product.photo)}" alt="${UI.escape(item.product.name)}" onerror="this.onerror=null;this.src='${CONFIG.PLACEHOLDER_IMAGE}';">
        <div class="cart-item-info">
          <h4>${UI.escape(item.product.name)}</h4>
          <div class="muted" style="font-size:.85rem;">${UI.money(item.product.price)} each</div>
          <div class="qty-control mt-16">
            <button type="button" class="dec">−</button>
            <span>${item.qty}</span>
            <button type="button" class="inc">+</button>
          </div>
          <button class="remove-link">Remove</button>
        </div>
        <div style="font-weight:700;color:var(--forest);">${UI.money(item.lineTotal)}</div>
      </div>
    `).join("");

    wrap.querySelectorAll(".cart-item").forEach(row => {
      const id = row.dataset.id;
      const product = CART_PRODUCTS.find(p => String(p.id) === id);
      row.querySelector(".inc").addEventListener("click", () => {
        Cart.add(id, 1, product.stock);
        renderCart();
      });
      row.querySelector(".dec").addEventListener("click", () => {
        const current = Cart.get()[id] || 0;
        Cart.setQty(id, current - 1, product.stock);
        renderCart();
      });
      row.querySelector(".remove-link").addEventListener("click", () => {
        Cart.remove(id);
        UI.toast("Item removed");
        renderCart();
      });
    });

    updateSummary(Cart.total(CART_PRODUCTS));
    const badge = document.getElementById("cart-count");
    if (badge) { badge.textContent = Cart.count(); badge.style.display = Cart.count() > 0 ? "flex" : "none"; }
  }

  function updateSummary(subtotal) {
    const delivery = subtotal > 0 ? DELIVERY_FEE : 0;
    document.getElementById("sum-subtotal").textContent = UI.money(subtotal);
    document.getElementById("sum-delivery").textContent = UI.money(delivery);
    document.getElementById("sum-total").textContent = UI.money(subtotal + delivery);
  }
</script>
</body>
</html>
