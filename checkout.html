<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — VillageMart</title>
<link rel="icon" href="assets/placeholder.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="nav-row">
    <a href="index.html" class="brand"><span class="leaf-dot"></span>VillageMart</a>
    <button class="hamburger" aria-label="Toggle menu">☰</button>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-badge" id="cart-count" style="display:none;">0</span></a>
      <a href="orders.html">Orders</a>
      <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
      <span id="auth-slot" style="display:flex; gap:4px; align-items:center;"></span>
    </nav>
  </div>
</header>

<div class="page-title-bar">
  <div class="container"><h1 style="font-size:1.6rem;">Checkout</h1></div>
</div>

<div class="container section">
  <div class="cart-layout">
    <div class="card-panel wide" style="max-width:none;">
      <h3>Delivery details</h3>
      <form id="checkout-form">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" required>
        </div>
        <div class="two-col">
          <div class="field">
            <label for="phone">Phone number</label>
            <input type="tel" id="phone" required>
          </div>
          <div class="field">
            <label for="payment">Payment method</label>
            <select id="payment">
              <option value="Cash on Delivery">Cash on Delivery</option>
              <option value="UPI">UPI</option>
              <option value="Card on Delivery">Card on Delivery</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="address">Delivery address</label>
          <textarea id="address" rows="3" required placeholder="House no, street, village/town, pincode"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="place-order-btn">Place order</button>
      </form>
    </div>

    <div class="summary-box">
      <h3>Order summary</h3>
      <div id="checkout-items" class="mb-16"></div>
      <div class="summary-row"><span>Subtotal</span><span id="sum-subtotal">₹0</span></div>
      <div class="summary-row"><span>Delivery</span><span id="sum-delivery">₹0</span></div>
      <div class="summary-row total"><span>Total</span><span id="sum-total">₹0</span></div>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="container"><p>🌿 VillageMart — fresh groceries from your village store, delivered with care.</p></div>
</footer>

<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/sheets.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/orders.js"></script>
<script src="js/ui.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
