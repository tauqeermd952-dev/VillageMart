<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — VillageMart</title>
<link rel="icon" href="assets/placeholder.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="nav-row">
    <a href="index.html" class="brand"><span class="leaf-dot"></span>VillageMart</a>
    <button class="hamburger" aria-label="Toggle menu">☰</button>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-badge" id="cart-count" style="display:none;">0</span></a>
      <a href="orders.html">Orders</a>
      <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
      <span id="auth-slot" style="display:flex; gap:4px; align-items:center;"></span>
    </nav>
  </div>
</header>

<div class="auth-wrap">
  <div class="card-panel">
    <h2 class="text-center">Welcome back</h2>
    <p class="muted text-center mb-16">Log in to shop and track your orders.</p>
    <div class="form-error" id="error-box"></div>
    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>
    <p class="form-note">New to VillageMart? <a href="signup.html">Create an account</a></p>
    <p class="form-note muted" style="font-size:.78rem;">Demo admin: admin@villagemart.com / admin123</p>
  </div>
</div>

<footer class="site-footer">
  <div class="container"><p>🌿 VillageMart — fresh groceries from your village store, delivered with care.</p></div>
</footer>

<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/sheets.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/orders.js"></script>
<script src="js/ui.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    UI.initHeader();
    document.getElementById("login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const errorBox = document.getElementById("error-box");
      errorBox.classList.remove("show");
      try {
        const user = Auth.login(document.getElementById("email").value, document.getElementById("password").value);
        UI.toast("Welcome back, " + user.name.split(" ")[0] + "!");
        const params = new URLSearchParams(window.location.search);
        const next = params.get("next");
        setTimeout(() => window.location.href = (next && next !== "login.html") ? next : (user.role === "admin" ? "admin.html" : "index.html"), 400);
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("show");
      }
    });
  });
</script>
</body>
</html>
