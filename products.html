<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Products — VillageMart</title>
<link rel="icon" href="assets/placeholder.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="nav-row">
    <a href="index.html" class="brand"><span class="leaf-dot"></span>VillageMart</a>
    <button class="hamburger" aria-label="Toggle menu">☰</button>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-badge" id="cart-count" style="display:none;">0</span></a>
      <a href="orders.html">Orders</a>
      <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
      <span id="auth-slot" style="display:flex; gap:4px; align-items:center;"></span>
    </nav>
  </div>
</header>

<div class="page-title-bar">
  <div class="container">
    <h1 style="font-size:1.6rem;">Shop all products</h1>
    <p class="muted">Fresh stock, updated straight from our store sheet.</p>
  </div>
</div>

<div class="container section">
  <div class="filters">
    <input type="text" id="search-input" placeholder="Search products...">
    <select id="category-filter">
      <option value="">All categories</option>
    </select>
    <select id="sort-select">
      <option value="">Sort: Relevance</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="name-asc">Name: A–Z</option>
      <option value="stock-desc">Stock: High to Low</option>
    </select>
    <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--stone);">
      <input type="checkbox" id="in-stock-only" style="width:auto;"> In stock only
    </label>
  </div>

  <p class="result-count" id="result-count"></p>
  <div class="product-grid" id="product-grid">
    <!-- injected -->
  </div>
</div>

<footer class="site-footer">
  <div class="container"><p>🌿 VillageMart — fresh groceries from your village store, delivered with care.</p></div>
</footer>

<a class="wa-float" id="wa-float" target="_blank" rel="noopener" title="Order on WhatsApp">💬</a>

<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/sheets.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/orders.js"></script>
<script src="js/ui.js"></script>
<script src="js/products.js"></script>
</body>
</html>
