<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — VillageMart</title>
<link rel="icon" href="assets/placeholder.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="nav-row">
    <a href="index.html" class="brand"><span class="leaf-dot"></span>VillageMart</a>
    <button class="hamburger" aria-label="Toggle menu">☰</button>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-badge" id="cart-count" style="display:none;">0</span></a>
      <a href="orders.html">Orders</a>
      <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
      <span id="auth-slot" style="display:flex; gap:4px; align-items:center;"></span>
    </nav>
  </div>
</header>

<div class="auth-wrap" style="min-height:auto; padding: 40px 16px;">
  <div class="card-panel">
    <h2 class="text-center">My profile</h2>
    <div class="form-error" id="error-box"></div>
    <form id="profile-form">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" disabled>
      </div>
      <div class="field">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" required>
      </div>
      <div class="field">
        <label for="address">Delivery address</label>
        <input type="text" id="address">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Save changes</button>
    </form>
    <button class="btn btn-outline btn-block mt-16" id="logout-btn2">Log out</button>
  </div>
</div>

<footer class="site-footer">
  <div class="container"><p>🌿 VillageMart — fresh groceries from your village store, delivered with care.</p></div>
</footer>

<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/sheets.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/orders.js"></script>
<script src="js/ui.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    UI.initHeader();
    if (!Auth.requireLogin("login.html")) return;

    const user = Auth.currentUser();
    document.getElementById("name").value = user.name;
    document.getElementById("email").value = user.email;
    document.getElementById("phone").value = user.phone || "";
    document.getElementById("address").value = user.address || "";

    document.getElementById("profile-form").addEventListener("submit", (e) => {
      e.preventDefault();
      try {
        Auth.updateProfile(user.email, {
          name: document.getElementById("name").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          address: document.getElementById("address").value.trim()
        });
        UI.toast("Profile updated");
      } catch (err) {
        const box = document.getElementById("error-box");
        box.textContent = err.message;
        box.classList.add("show");
      }
    });

    document.getElementById("logout-btn2").addEventListener("click", () => {
      Auth.logout();
      window.location.href = "index.html";
    });
  });
</script>
</body>
</html>
